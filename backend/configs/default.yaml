pipeline:
  default_confidence: high

text_extraction:
  min_chars: 80
  max_garbage_ratio: 0.35
  require_czech_signal: true
  ocr_agreement_threshold: 0.75
  ocrmypdf_language: ces+eng

ocr:
  paddle_lang: cs
  tesseract_lang: ces
  paddle_gpu: true
  tesseract_threshold: 15
  paddle_threshold: 15
  pdf_dpi: 300
  layout_preserve_columns: true
  layout_column_gap_ratio: 0.12
  layout_space_divisor: 6
  layout_char_width: 8
  layout_blank_line_multiplier: 2.5

llm:
  primary_model: deepseek-ai/DeepSeek-V4-Flash
  use_structured_output: true
  temperature: 0.0

validation:
  totals_tolerance: 1.0

vision:
  enabled: true
  model: Qwen/Qwen3-VL-30B-A3B-Instruct
  max_pages: 4
  max_tokens: 4096
  min_chars_per_page: 120
  min_numeric_columns: 3
  min_numeric_lines: 4

escalation:
  enabled: true
  model: deepseek-ai/DeepSeek-V4-Pro
  max_retries: 1
