pipeline:
  legacy_extraction_path: legacy:double_ocr_double_llm_tmr
  default_confidence: high

text_extraction:
  min_chars: 80
  max_garbage_ratio: 0.35
  require_czech_signal: true
  ocr_agreement_threshold: 0.75
  ocrmypdf_language: ces+eng

ocr:
  paddle_lang: cs
  tesseract_lang: ces
  paddle_gpu: true
  tesseract_threshold: 15
  paddle_threshold: 15
  pdf_dpi: 300

# Fast models for legacy 2x LLM path (see https://deepinfra.com/models)
llm:
  primary_model: deepseek-ai/DeepSeek-V4-Flash
  use_structured_output: true
  temperature: 0.0
  deepseek_model: deepseek-ai/DeepSeek-V4-Flash
  llama_model: meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
  maverick_model: meta-llama/Llama-4-Scout-17B-16E-Instruct
