pipeline:
  legacy_extraction_path: legacy:triple_ocr_triple_llm_tmr
  default_confidence: high

ocr:
  easyocr_lang: cs
  paddle_lang: cs
  tesseract_lang: ces
  easyocr_gpu: true
  paddle_gpu: true
  tesseract_threshold: 15
  paddle_threshold: 15
  easyocr_threshold: 30
  pdf_dpi: 300

# Fast models for legacy 3x LLM path (see https://deepinfra.com/models)
llm:
  deepseek_model: deepseek-ai/DeepSeek-V4-Flash
  llama_model: meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
  maverick_model: meta-llama/Llama-4-Scout-17B-16E-Instruct
